name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_VERSION: 8.5

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Android SDK 34
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>&1 || \
          $ANDROID_HOME/tools/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>&1 || true
          echo "sdk.dir=$ANDROID_HOME" > android_app/local.properties

      - name: 下载并安装 Gradle
        run: |
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          unzip -q "gradle-${GRADLE_VERSION}-bin.zip"
          echo "GRADLE_HOME=$PWD/gradle-${GRADLE_VERSION}" >> $GITHUB_ENV
          echo "$PWD/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH
          gradle --version

      - name: 编译 APK
        run: |
          cd android_app
          gradle assembleDebug --no-daemon --stacktrace 2>&1

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-doorlock-apk
          path: android_app/app/build/outputs/apk/debug/app-debug.apk
