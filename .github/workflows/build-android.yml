name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android_app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android_app

    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 Android SDK 34
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>&1 || \
          $ANDROID_HOME/tools/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>&1 || true
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: 生成 Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.5
          ls -la gradlew gradle/wrapper/

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: smart-doorlock-apk
          path: android_app/app/build/outputs/apk/debug/app-debug.apk
